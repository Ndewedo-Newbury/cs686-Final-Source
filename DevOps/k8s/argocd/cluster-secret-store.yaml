# ClusterSecretStore — referenced by every ExternalSecret in the Helm charts.
# Requires the External Secrets Operator to be installed:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm upgrade --install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
#
# The ESO pod uses IRSA — the node's instance profile must have
# secretsmanager:GetSecretValue on the relevant paths, or a dedicated
# ESO IAM role can be used via the serviceAccount annotation below.
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
