name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  PROJECT: fitness-tracker
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run unit tests
        run: .github/scripts/unit-test.sh ${{ matrix.service }}

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push all images
        run: .github/scripts/build-and-push.sh

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda image to latest build
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.PROJECT }}/test-runner:latest"
          for fn in ${{ env.PROJECT }}-dev-test-runner ${{ env.PROJECT }}-dev-migrate; do
            aws lambda update-function-code \
              --function-name "${fn}" \
              --image-uri "${IMAGE}" \
              --query 'FunctionName' --output text
            aws lambda wait function-updated --function-name "${fn}"
          done

      - name: Migrate each service database
        run: |
          for svc in auth-service workouts-service analytics-service; do
            echo "--- Migrating ${svc} ---"
            aws lambda invoke \
              --function-name ${{ env.PROJECT }}-dev-migrate \
              --payload "{\"service\":\"${svc}\"}" \
              --cli-binary-format raw-in-base64-out \
              /tmp/migrate-result.json
            jq . /tmp/migrate-result.json
            jq -e '.success == true' /tmp/migrate-result.json
          done

  integration-test:
    name: Integration Tests (Lambda)
    runs-on: ubuntu-latest
    needs: migrate
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run integration tests
        run: .github/scripts/invoke-tests.sh ${{ env.PROJECT }}-dev-test-runner ${{ matrix.service }} integration

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: integration-test

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump dev Helm values
        run: |
          SHA=$(git rev-parse --short HEAD)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for svc in auth-service workouts-service analytics-service frontend; do
            FILE="DevOps/helm/values/dev-${svc}.yaml"
            if [[ -n "${AWS_REGION:-}" ]]; then
              sed -i "s|dkr\.ecr\.[a-z0-9-]*\.amazonaws\.com|dkr.ecr.${AWS_REGION}.amazonaws.com|g" "${FILE}"
            fi
            sed -i "s|tag: .*|tag: sha-${SHA}|g" "${FILE}"
            git add "${FILE}"
          done
          git diff --staged --quiet || git commit -m "chore(dev): deploy sha-${SHA}"
          git pull --rebase origin main
          git push

# ── Promote dev → QA → UAT (runs automatically after every successful deploy) ─

  promote-qa:
    name: Promote dev → QA
    runs-on: ubuntu-latest
    needs: deploy-dev

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag dev-latest → qa-latest
        run: .github/scripts/retag-images.sh dev-latest qa-latest

      - name: Update QA Helm values
        run: |
          SHA=$(git rev-parse --short HEAD)
          .github/scripts/update-helm-tag.sh DevOps/helm/values/qa.yaml qa-latest "chore(qa): promote sha-${SHA}"

  e2e-qa:
    name: E2E Tests — QA (Lambda)
    runs-on: ubuntu-latest
    needs: promote-qa
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run E2E tests
        run: .github/scripts/invoke-tests.sh ${{ env.PROJECT }}-dev-test-runner ${{ matrix.service }} e2e

  promote-uat:
    name: Promote QA → UAT
    runs-on: ubuntu-latest
    needs: e2e-qa

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag qa-latest → uat-latest
        run: .github/scripts/retag-images.sh qa-latest uat-latest

      - name: Update UAT Helm values
        run: |
          SHA=$(git rev-parse --short HEAD)
          .github/scripts/update-helm-tag.sh DevOps/helm/values/uat.yaml uat-latest "chore(uat): promote sha-${SHA}"

  smoke-uat:
    name: Smoke Tests — UAT (Lambda)
    runs-on: ubuntu-latest
    needs: promote-uat
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: .github/scripts/invoke-tests.sh ${{ env.PROJECT }}-dev-test-runner ${{ matrix.service }} smoke
