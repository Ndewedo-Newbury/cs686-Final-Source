name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v1.0.1)"
        required: true
  push:
    tags:
      - "v*.*.*"             # v1.0.1 → UAT → prod

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  PROJECT: fitness-tracker
  SERVICES: auth-service workouts-service analytics-service frontend
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  promote-prod:
    name: Promote UAT → Prod
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-tag uat-latest → version tag
        run: .github/scripts/retag-images.sh uat-latest "${{ steps.version.outputs.tag }}"

      - name: Run Alembic migrations
        run: .github/scripts/run-migrations.sh ${{ env.PROJECT }}-prod-migrate

      - name: Update prod Helm values
        run: |
          .github/scripts/update-helm-tag.sh DevOps/helm/values/prod.yaml \
            "${{ steps.version.outputs.tag }}" \
            "release: deploy ${{ steps.version.outputs.tag }} to production"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.tag }}
