replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8001

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  DATABASE_URL: ""
  JWT_SECRET_KEY: ""

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  dbSecretPath: ""
  jwtSecretPath: ""

serviceAccount:
  name: auth-service
  roleArn: ""

blueGreen:
  enabled: false
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 900
