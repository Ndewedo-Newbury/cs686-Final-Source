# Helm values for kube-prometheus-stack
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   -n monitoring --create-namespace -f kube-prometheus-stack-values.yaml

grafana:
  adminPassword: ""  # disabled — GitHub OAuth only

  grafana.ini:
    server:
      root_url: https://grafana.fittracker.example.com
    auth:
      disable_login_form: true
    auth.github:
      enabled: true
      allow_sign_up: true
      client_id: ${GITHUB_OAUTH_CLIENT_ID}
      client_secret: ${GITHUB_OAUTH_CLIENT_SECRET}
      scopes: user:email,read:org
      auth_url: https://github.com/login/oauth/authorize
      token_url: https://github.com/login/oauth/access_token
      api_url: https://api.github.com/user
      allowed_organizations: <YOUR_GITHUB_ORG>

  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: external
      service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
      service.beta.kubernetes.io/aws-load-balancer-ssl-cert: <ACM_CERT_ARN>
      service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: monitoring
          orgId: 1
          folder: Infrastructure
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/monitoring

  dashboards:
    monitoring:
      node-exporter-full:
        gnetId: 1860        # Node Exporter Full — per-node CPU, memory, disk, network
        revision: 37
        datasource: Prometheus

prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: <ALERTMANAGER_ROLE_ARN>   # terraform output: module.monitoring.alertmanager_role_arn

  config:
    route:
      group_by: [alertname, namespace]
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: critical
    receivers:
      - name: default
        sns_configs:
          - api_url: https://sns.us-east-1.amazonaws.com
            topic_arn: <ALERTMANAGER_SNS_TOPIC_ARN>          # terraform output: module.monitoring.sns_topic_arn
            sigv4:
              region: us-east-1
            send_resolved: true
      - name: critical
        sns_configs:
          - api_url: https://sns.us-east-1.amazonaws.com
            topic_arn: <ALERTMANAGER_SNS_TOPIC_ARN>
            sigv4:
              region: us-east-1
            send_resolved: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
