name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  PROJECT: fitness-tracker
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Run unit tests
        run: .github/scripts/unit-test.sh ${{ matrix.service }}

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: unit-test
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push all images
        run: .github/scripts/build-and-push.sh

  integration-test:
    name: Integration Tests (Lambda)
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run integration tests
        run: .github/scripts/invoke-tests.sh ${{ env.PROJECT }}-dev-test-runner ${{ matrix.service }} integration

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: integration-test

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Bump dev Helm values
        run: |
          SHA=$(git rev-parse --short HEAD)
          .github/scripts/update-helm-tag.sh \
            DevOps/helm/values/dev.yaml \
            "sha-${SHA}" \
            "chore(dev): deploy sha-${SHA}"
