    roleArn: <WORKOUTS_SERVICE_ROLE_ARN>
  externalSecrets:
    dbSecretPath: fitness-tracker/uat/workouts/db
    jwtSecretPath: fitness-tracker/uat/auth/jwt
    sqsSecretPath: fitness-tracker/uat/workouts/sqs

analytics-service:
  replicaCount: 2
