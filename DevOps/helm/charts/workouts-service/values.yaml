replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 8002

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

externalSecrets:
  enabled: true
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  dbSecretPath: ""
  jwtSecretPath: ""
  sqsSecretPath: ""

serviceAccount:
  name: workouts-service
  roleArn: ""

blueGreen:
  enabled: false
  autoPromotionEnabled: false
  scaleDownDelaySeconds: 900

pdb:
  enabled: true
  minAvailable: 1
