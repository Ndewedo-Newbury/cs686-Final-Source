# ClusterSecretStore — referenced by every ExternalSecret in the Helm charts.
#
# Auth: uses a Kubernetes secret (aws-credentials) in the external-secrets
# namespace. The bootstrap script creates this secret from the current shell's
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY / AWS_SESSION_TOKEN env vars.
#
# Voclabs credentials expire every ~4 hours. Run the helper to refresh:
#   DevOps/scripts/update-eso-creds.sh
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: access-key-id
          secretAccessKeySecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: secret-access-key
          sessionTokenSecretRef:
            name: aws-credentials
            namespace: external-secrets
            key: session-token
