auth-service:
  replicaCount: 3
  image:
    repository: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/fitness-tracker/auth-service
    tag: v1.0.0
  serviceAccount:
    roleArn: <AUTH_SERVICE_ROLE_ARN>
  externalSecrets:
    dbSecretPath: fitness-tracker/prod/auth/db
    jwtSecretPath: fitness-tracker/prod/auth/jwt
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  blueGreen:
    enabled: true
    autoPromotionEnabled: false
    scaleDownDelaySeconds: 900

