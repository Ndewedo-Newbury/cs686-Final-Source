# Helm values for Loki + Promtail (Grafana stack)
# helm repo add grafana https://grafana.github.io/helm-charts
# helm upgrade --install loki grafana/loki-stack \
#   -n monitoring --create-namespace -f loki-values.yaml

loki:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi

promtail:
  enabled: true
  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
        pipeline_stages:
          - json:
              expressions:
                level: levelname
                request_id: request_id
                status_code: status_code
                duration_ms: duration_ms
          - labels:
              level:
              request_id:

grafana:
  enabled: false  # grafana already installed via kube-prometheus-stack; add Loki as datasource there
