name: Nightly QA Promotion

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC every night
  workflow_dispatch:        # allow manual trigger without waiting for cron

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  PROJECT: fitness-tracker
  SERVICES: auth-service workouts-service analytics-service frontend
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}

jobs:
  promote-qa:
    name: Promote dev → QA
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag dev-latest → qa-latest
        run: .github/scripts/retag-images.sh dev-latest qa-latest

      - name: Update QA Helm values
        run: |
          SHA=$(git rev-parse --short HEAD)
          .github/scripts/update-helm-tag.sh DevOps/helm/values/qa.yaml qa-latest "chore(qa): promote sha-${SHA}"

  e2e-qa:
    name: E2E Tests — QA (Lambda)
    runs-on: ubuntu-latest
    needs: promote-qa
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run E2E tests
        run: .github/scripts/invoke-tests.sh ${{ env.PROJECT }}-qa-test-runner ${{ matrix.service }} e2e
