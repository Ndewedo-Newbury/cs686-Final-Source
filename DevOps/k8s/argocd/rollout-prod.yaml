# Blue/Green Rollout resources are now generated by each service's Helm chart.
# When blueGreen.enabled=true (set in values/prod.yaml), each chart's
# deployment.yaml renders kind: Rollout instead of kind: Deployment, and
# service.yaml renders <name>-active + <name>-preview Services.
#
# This file is intentionally empty — kept as a placeholder so ArgoCD does not
# try to prune a previously-applied Rollout object.
#
# Prerequisites (run once per cluster):
#   kubectl apply -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml -n argo-rollouts
#
# To promote a paused Rollout after validating the preview environment:
#   kubectl argo rollouts promote <service-name> -n prod
