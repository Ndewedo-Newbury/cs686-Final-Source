    tag: RC1
  serviceAccount:
    roleArn: <ANALYTICS_SERVICE_ROLE_ARN>
  externalSecrets:
    dbSecretPath: fitness-tracker/uat/analytics/db
    jwtSecretPath: fitness-tracker/uat/auth/jwt
    sqsSecretPath: fitness-tracker/uat/workouts/sqs

frontend:
