name: Release Promotion

# QA → UAT:  push (or merge) to a release/* branch
#             e.g. git checkout -b release/v1.1.0 && git push origin release/v1.1.0
#
# UAT → Prod: push a semver tag
#             e.g. git tag v1.1.0 && git push origin v1.1.0
#             or trigger manually via workflow_dispatch

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v1.1.0) — UAT → Prod only"
        required: true

env:
  AWS_REGION: us-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-west-2.amazonaws.com
  PROJECT: fitness-tracker
  SERVICES: auth-service workouts-service analytics-service frontend
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  UAT_API_URL: https://uat.cs686.live

# ── QA → UAT ─────────────────────────────────────────────────────────────────
# Triggered only when a release/* branch is pushed.

jobs:
  promote-uat:
    name: Promote QA → UAT
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/heads/release/')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag qa-latest → uat-latest
        run: .github/scripts/retag-images.sh qa-latest uat-latest

      - name: Update UAT Helm values
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          .github/scripts/update-helm-tag.sh DevOps/helm/values/uat.yaml \
            uat-latest "chore(uat): promote from ${BRANCH}"

  smoke-uat:
    name: Smoke Tests — UAT (Lambda)
    runs-on: ubuntu-latest
    needs: promote-uat
    if: startsWith(github.ref, 'refs/heads/release/')
    strategy:
      matrix:
        service: [auth-service, workouts-service, analytics-service]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run smoke tests
        run: |
          .github/scripts/invoke-tests.sh \
            ${{ env.PROJECT }}-dev-test-runner \
            ${{ matrix.service }} smoke \
            uat ${{ env.UAT_API_URL }}

# ── UAT → Prod ────────────────────────────────────────────────────────────────
# Triggered by a semver tag push (v*.*.*) or manual workflow_dispatch.

  promote-prod:
    name: Promote UAT → Prod
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve version tag
        id: version
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-tag uat-latest → version tag
        run: .github/scripts/retag-images.sh uat-latest "${{ steps.version.outputs.tag }}"

      - name: Run Alembic migrations
        run: .github/scripts/run-migrations.sh ${{ env.PROJECT }}-prod-migrate

      - name: Update prod Helm values
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          .github/scripts/update-helm-tag.sh DevOps/helm/values/prod.yaml \
            "${{ steps.version.outputs.tag }}" \
            "release: deploy ${{ steps.version.outputs.tag }} to production"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.tag }}
